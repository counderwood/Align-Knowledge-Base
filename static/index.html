<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Align Builders — Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #0f0f0f;
    --dark:    #181818;
    --panel:   #212222;
    --border:  #2e2e2e;
    --gold:    #edaf1f;
    --offwhite:#e0e2db;
    --muted:   #6b6b6b;
    --green:   #3ecf6e;
    --red:     #e05555;
    --radius:  10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 34px;
    height: 34px;
    background: var(--gold);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
  }

  .logo-text span { color: var(--gold); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .status-dot.error   { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Sync banner */
  #syncBanner {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #syncBanner.hidden { display: none; }

  .sync-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    max-width: 200px;
  }

  .sync-bar {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0%   { opacity: 1; }
    50%  { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* Suggestions */
  .suggestions {
    padding: 16px 24px 0;
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .suggestion-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    padding: 6px 13px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .suggestion-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Chat */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeUp 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
  }

  .avatar.bot  { background: var(--gold); color: var(--black); }
  .avatar.user { background: var(--panel); border: 1px solid var(--border); color: var(--offwhite); }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius);
    max-width: 680px;
    line-height: 1.7;
  }

  .message.bot  .bubble { background: var(--panel); border: 1px solid var(--border); border-top-left-radius: 3px; }
  .message.user .bubble { background: var(--gold); color: var(--black); font-weight: 500; border-top-right-radius: 3px; }

  .bubble p { margin-bottom: 10px; }
  .bubble p:last-child { margin-bottom: 0; }

  .sources { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }

  .source-chip {
    font-size: 11px;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 9px;
    border-radius: 4px;
  }

  /* Typing */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 17px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 3px;
    width: fit-content;
  }

  .typing-dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Empty state */
  .empty-state {
    margin: auto;
    text-align: center;
    opacity: 0.4;
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .empty-state p { font-size: 14px; color: var(--muted); }

  /* Input */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--dark);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color 0.15s;
  }

  .input-row:focus-within { border-color: var(--gold); }

  #queryInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    max-height: 140px;
    line-height: 1.5;
  }

  #queryInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 36px; height: 36px;
    border-radius: 7px;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #sendBtn:hover  { opacity: 0.85; }
  #sendBtn:active { transform: scale(0.93); }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-hint { font-size: 11.5px; color: var(--muted); margin-top: 8px; padding-left: 2px; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .icon-btn:hover { color: var(--offwhite); border-color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="10" width="4" height="8" fill="#212222"/>
        <rect x="8" y="6" width="4" height="12" fill="#212222"/>
        <rect x="14" y="2" width="4" height="16" fill="#212222"/>
      </svg>
    </div>
    <div class="logo-text">ALIGN <span>BUILDERS</span> &mdash; Knowledge Base</div>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="triggerSync()">↻ Sync Drive</button>
    <button class="icon-btn" onclick="clearChat()">Clear chat</button>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>
</header>

<div id="syncBanner" class="hidden">
  <span id="syncMsg">Indexing PDFs from Google Drive...</span>
  <div class="sync-bar-wrap">
    <div class="sync-bar" id="syncBar" style="width:30%"></div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="suggestion-btn" onclick="sendSuggestion(this)">HCAI / OSHPD compliance experience</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Rady Children's Hospital projects</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">CMAR delivery method approach</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Key project references</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Healthcare safety protocols</button>
</div>

<div id="chat">
  <div class="empty-state" id="emptyState">
    <span class="icon">📁</span>
    <h2>Ask anything about your documents</h2>
    <p>Answers come directly from your indexed PDF library.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="queryInput" rows="1" placeholder="Ask a question about your proposals, projects, or team..."></textarea>
    <button id="sendBtn" onclick="sendQuery()">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M8.5 1.5V15.5M8.5 1.5L3 7M8.5 1.5L14 7" stroke="#212222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
  const chat       = document.getElementById('chat');
  const input      = document.getElementById('queryInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusDot  = document.getElementById('statusDot');
  const statusTxt  = document.getElementById('statusText');
  const emptyState = document.getElementById('emptyState');
  const suggestions= document.getElementById('suggestions');
  const syncBanner = document.getElementById('syncBanner');
  const syncMsg    = document.getElementById('syncMsg');

  let history  = [];
  let isLoading = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  });

  function setStatus(state, text) {
    statusDot.className = 'status-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    statusTxt.textContent = text;
  }

  // Poll stats every 5 seconds to show sync progress
  async function pollStats() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();
      const sync = data.sync || {};

      if (sync.state === 'syncing') {
        setStatus('syncing', 'Indexing PDFs...');
        syncBanner.classList.remove('hidden');
        syncMsg.textContent = sync.message || 'Indexing...';
      } else if (sync.state === 'error') {
        setStatus('error', 'Sync error');
        syncBanner.classList.add('hidden');
      } else {
        syncBanner.classList.add('hidden');
        if (data.chunks > 0) {
          setStatus('ready', `${data.chunks.toLocaleString()} chunks · ${data.files} PDFs`);
        } else {
          setStatus('ready', 'Ready');
        }
      }
    } catch (e) {
      setStatus('error', 'Server offline');
    }
    setTimeout(pollStats, 5000);
  }

  pollStats();

  function appendMessage(role, text, sources = []) {
    emptyState.style.display = 'none';
    suggestions.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? 'AB' : 'YOU';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    text.split(/\n\n+/).forEach(p => {
      if (p.trim()) {
        const el = document.createElement('p');
        el.textContent = p.trim();
        bubble.appendChild(el);
      }
    });

    if (sources.length > 0) {
      const sourceDiv = document.createElement('div');
      sourceDiv.className = 'sources';
      sources.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'source-chip';
        chip.textContent = '📄 ' + s;
        sourceDiv.appendChild(chip);
      });
      bubble.appendChild(sourceDiv);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function appendTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typingMsg';
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'AB';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('div');
      d.className = 'typing-dot';
      ind.appendChild(d);
    }
    msg.appendChild(avatar);
    msg.appendChild(ind);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  async function sendQuery() {
    const query = input.value.trim();
    if (!query || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', query);
    appendTyping();

    try {
      const res = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history })
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendMessage('bot', 'Something went wrong: ' + data.error);
      } else {
        appendMessage('bot', data.answer, data.sources || []);
        history.push({ user: query, assistant: data.answer });
        if (history.length > 10) history = history.slice(-10);
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', 'Could not reach the server. Please try again.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    sendQuery();
  }

  async function triggerSync() {
    await fetch('/api/sync', { method: 'POST' });
    setStatus('syncing', 'Syncing Drive...');
  }

  function clearChat() {
    history = [];
    chat.querySelectorAll('.message').forEach(m => m.remove());
    emptyState.style.display = '';
    suggestions.style.display = '';
  }
</script>
</body>
</html>
